<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embedded Player</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <iframe
    src="https://megaplay.buzz/stream/s-2/1/sub?autostart=true"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen
    referrerpolicy="origin">
  </iframe>
</body>
</html>
