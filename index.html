<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MegaPlay Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e2e8;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      background: #13131a;
      border-bottom: 1px solid #222230;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #topbar .brand {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #7c6dfa;
      margin-right: 4px;
      white-space: nowrap;
    }

    .field-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .field-group label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }
    .field-group input {
      width: 72px;
      padding: 4px 8px;
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      border-radius: 6px;
      color: #e2e2e8;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .field-group input:focus { border-color: #7c6dfa; }

    /* Dub / Sub toggle */
    #lang-toggle {
      display: flex;
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
    }
    #lang-toggle button {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    #lang-toggle button.active {
      background: #7c6dfa;
      color: #fff;
    }

    /* Auto-next toggle */
    #autonext-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }
    #autonext-wrap span {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }
    /* pill toggle switch */
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #2e2e42;
      border-radius: 20px;
      cursor: pointer;
      transition: background .2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .switch input:checked + .slider { background: #7c6dfa; }
    .switch input:checked + .slider::before { transform: translateX(16px); }

    /* Play button */
    #btn-go {
      padding: 5px 16px;
      background: #7c6dfa;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    #btn-go:hover { background: #6a5be0; }

    /* URL display */
    #url-display {
      flex: 1;
      min-width: 120px;
      font-size: 11px;
      color: #555;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Player area ── */
    #player-wrap {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    #player-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #444;
    }
    #placeholder svg { opacity: .3; }
    #placeholder p { font-size: 14px; }

    #player-iframe { display: none; }

    /* ── Auto-next countdown overlay ── */
    #autonext-overlay {
      display: none;
      position: absolute;
      bottom: 28px;
      right: 28px;
      background: rgba(10,10,15,.88);
      border: 1px solid #2e2e42;
      border-radius: 14px;
      padding: 14px 20px;
      min-width: 220px;
      z-index: 10;
      backdrop-filter: blur(6px);
    }
    #autonext-overlay .an-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 6px;
    }
    #autonext-overlay .an-ep {
      font-size: 15px;
      font-weight: 700;
      color: #e2e2e8;
      margin-bottom: 10px;
    }
    /* progress bar */
    #an-bar-bg {
      width: 100%;
      height: 4px;
      background: #2e2e42;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    #an-bar {
      height: 100%;
      width: 100%;
      background: #7c6dfa;
      border-radius: 4px;
      transform-origin: left;
      transition: transform linear;
    }
    .an-btns {
      display: flex;
      gap: 8px;
    }
    .an-btns button {
      flex: 1;
      padding: 5px 0;
      border: none;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    #an-btn-now  { background: #7c6dfa; color: #fff; }
    #an-btn-now:hover  { background: #6a5be0; }
    #an-btn-cancel { background: #1e1e2e; color: #aaa; border: 1px solid #2e2e42; }
    #an-btn-cancel:hover { background: #2e2e42; }
  </style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <span class="brand">▶ MegaPlay</span>

    <div class="field-group">
      <label>MAL ID</label>
      <input id="inp-mal" type="number" placeholder="e.g. 1735" min="1">
    </div>

    <div class="field-group">
      <label>Episode</label>
      <input id="inp-ep" type="number" placeholder="e.g. 11" min="1">
    </div>

    <div id="lang-toggle">
      <button id="btn-dub" class="active" onclick="setLang('dub')">DUB</button>
      <button id="btn-sub" onclick="setLang('sub')">SUB</button>
    </div>

    <!-- Auto-next toggle -->
    <div id="autonext-wrap">
      <span>Auto-Next</span>
      <label class="switch">
        <input type="checkbox" id="chk-autonext" checked>
        <span class="slider"></span>
      </label>
    </div>

    <button id="btn-go" onclick="loadPlayer()">Play</button>

    <span id="url-display"></span>
  </div>

  <div id="player-wrap">
    <div id="placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="12" cy="12" r="10"/>
        <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
      </svg>
      <p>Enter a MAL ID &amp; episode, or open a direct URL</p>
      <p style="font-size:12px;color:#333">e.g. /mal/1735/11/</p>
    </div>

    <iframe
      id="player-iframe"
      allow="autoplay; fullscreen; picture-in-picture"
      allowfullscreen
      referrerpolicy="origin">
    </iframe>

    <!-- Auto-next countdown card -->
    <div id="autonext-overlay">
      <div class="an-title">Up next</div>
      <div class="an-ep" id="an-ep-label">Episode —</div>
      <div id="an-bar-bg"><div id="an-bar"></div></div>
      <div class="an-btns">
        <button id="an-btn-now"    onclick="goNextNow()">Play Now</button>
        <button id="an-btn-cancel" onclick="cancelAutoNext()">Cancel</button>
      </div>
    </div>
  </div>

</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let currentLang    = 'dub';
  let autoNextTimer  = null;   // setInterval handle
  const COUNTDOWN_S  = 10;     // seconds before auto-advancing

  // ── URL helpers ────────────────────────────────────────────────────────────
  function buildSrc(malId, episode, lang) {
    return `https://megaplay.buzz/stream/mal/${malId}/${episode}/${lang}?autostart=true`;
  }

  function buildPageUrl(malId, episode, lang) {
    const base = `${location.origin}${location.pathname}`;
    return `${base}mal/${malId}/${episode}/${lang}/`;
  }

  // ── Language toggle ────────────────────────────────────────────────────────
  function setLang(lang) {
    currentLang = lang;
    document.getElementById('btn-dub').classList.toggle('active', lang === 'dub');
    document.getElementById('btn-sub').classList.toggle('active', lang === 'sub');

    const malId   = document.getElementById('inp-mal').value.trim();
    const episode = document.getElementById('inp-ep').value.trim();
    if (malId && episode && document.getElementById('player-iframe').style.display !== 'none') {
      showPlayer(buildSrc(malId, episode, lang), malId, episode, lang);
    }
  }

  // ── Core player ───────────────────────────────────────────────────────────
  function showPlayer(src, malId, episode, lang) {
    cancelAutoNext();   // clear any pending countdown when loading a new ep

    const iframe      = document.getElementById('player-iframe');
    const placeholder = document.getElementById('placeholder');

    iframe.src             = src;
    iframe.style.display   = 'block';
    placeholder.style.display = 'none';

    document.getElementById('inp-mal').value = malId;
    document.getElementById('inp-ep').value  = episode;

    const prettyUrl = buildPageUrl(malId, episode, lang);
    history.replaceState({ malId, episode, lang }, '', prettyUrl);
    document.getElementById('url-display').textContent = prettyUrl;
    document.title = `MAL ${malId} · Ep ${episode} · ${lang.toUpperCase()}`;

    // Start listening for the iframe to finish
    watchForEnd(iframe, malId, episode, lang);
  }

  function loadPlayer() {
    const malId   = document.getElementById('inp-mal').value.trim();
    const episode = document.getElementById('inp-ep').value.trim();
    if (!malId || !episode) {
      alert('Please enter both a MAL ID and an episode number.');
      return;
    }
    showPlayer(buildSrc(malId, episode, currentLang), malId, episode, currentLang);
  }

  // ── Auto-next detection ────────────────────────────────────────────────────
  //
  // megaplay.buzz is cross-origin so we can't read its DOM directly.
  // Strategy: poll the iframe's contentWindow for an "ended" state.
  // Many embed players post a window message when they finish; we listen for
  // common payloads AND do a fallback heartbeat poll.
  //
  let endWatchInterval = null;

  function watchForEnd(iframe, malId, episode, lang) {
    clearInterval(endWatchInterval);

    // 1️⃣  postMessage listener – catches players that broadcast "ended"
    function onMessage(e) {
      const d = e.data;
      if (!d) return;
      const str = typeof d === 'string' ? d : JSON.stringify(d);
      // Common keys sent by JWPlayer, Plyr, VideoJS, custom embeds
      if (/ended|complete|finish|event.*end/i.test(str)) {
        cleanup();
        triggerAutoNext(malId, episode, lang);
      }
    }
    window.addEventListener('message', onMessage);

    // 2️⃣  Heartbeat poll – detect when the iframe stops loading / src goes blank
    //     (some players navigate the iframe to about:blank when done)
    let stableChecks = 0;
    endWatchInterval = setInterval(() => {
      try {
        const iframeSrc = iframe.src || '';
        // If the player has navigated away to a blank/ended page
        if (iframeSrc === '' || iframeSrc === 'about:blank') {
          cleanup();
          triggerAutoNext(malId, episode, lang);
        }
      } catch(_) {}
    }, 2000);

    function cleanup() {
      clearInterval(endWatchInterval);
      window.removeEventListener('message', onMessage);
    }

    // Store cleanup so cancelAutoNext can also stop the watcher
    iframe._cleanup = cleanup;
  }

  // ── Countdown overlay ─────────────────────────────────────────────────────
  function triggerAutoNext(malId, episode, lang) {
    if (!document.getElementById('chk-autonext').checked) return;

    const nextEp = parseInt(episode, 10) + 1;
    document.getElementById('an-ep-label').textContent = `Episode ${nextEp}`;

    const overlay = document.getElementById('autonext-overlay');
    const bar     = document.getElementById('an-bar');
    overlay.style.display = 'block';

    // Animate bar from 100% → 0% over COUNTDOWN_S seconds
    bar.style.transition = 'none';
    bar.style.transform  = 'scaleX(1)';
    // Force reflow so the transition reset takes effect
    bar.getBoundingClientRect();
    bar.style.transition = `transform ${COUNTDOWN_S}s linear`;
    bar.style.transform  = 'scaleX(0)';

    let remaining = COUNTDOWN_S;
    autoNextTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        goNextNow();
      }
    }, 1000);
  }

  function goNextNow() {
    cancelAutoNext();
    const malId   = document.getElementById('inp-mal').value.trim();
    const episode = parseInt(document.getElementById('inp-ep').value.trim(), 10);
    if (!malId || !episode) return;
    const nextEp = episode + 1;
    showPlayer(buildSrc(malId, nextEp, currentLang), malId, nextEp, currentLang);
  }

  function cancelAutoNext() {
    clearInterval(autoNextTimer);
    autoNextTimer = null;
    const overlay = document.getElementById('autonext-overlay');
    if (overlay) overlay.style.display = 'none';
    // Also stop the end-watcher if active
    const iframe = document.getElementById('player-iframe');
    if (iframe && iframe._cleanup) { iframe._cleanup(); iframe._cleanup = null; }
  }

  // ── Parse URL on load ─────────────────────────────────────────────────────
  (function parseUrl() {
    const path     = location.pathname;
    const malMatch = path.match(/\/mal\/(\d+)\/(\d+)(?:\/(dub|sub))?/i);
    const params   = new URLSearchParams(location.search);

    let malId   = malMatch ? malMatch[1] : params.get('mal');
    let episode = malMatch ? malMatch[2] : params.get('ep');
    let lang    = (malMatch && malMatch[3]) ? malMatch[3].toLowerCase()
                : (params.get('lang') || 'dub');
    if (lang !== 'sub') lang = 'dub';

    if (malId)   document.getElementById('inp-mal').value = malId;
    if (episode) document.getElementById('inp-ep').value  = episode;

    setLang(lang);

    if (malId && episode) {
      showPlayer(buildSrc(malId, episode, lang), malId, episode, lang);
    }
  })();
</script>
</body>
</html>
